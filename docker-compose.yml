
services:
  # ============================================
  # PostgreSQL - Database do Evolution API
  # ============================================
  nfe-postgres:
    image: postgres:16-alpine
    container_name: nfe-postgres
    environment:
      POSTGRES_DB: evolution_db
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: nfe-pg-2026
    volumes:
      - nfe_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Redis - Cache do Evolution API
  # ============================================
  nfe-redis:
    image: redis:7-alpine
    container_name: nfe-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Evolution API - WhatsApp Server
  # ============================================
  nfe-evolution-api:
    image: evoapicloud/evolution-api:latest
    container_name: nfe-evolution-api
    ports:
      - "8085:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_URL=http://localhost:8085
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:nfe-pg-2026@nfe-postgres:5432/evolution_db?schema=evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=nfe_brasil
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_IS_ON_WHATSAPP=true
      - DATABASE_DELETE_MESSAGE=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://nfe-whatsapp-bot:3002/webhook/evolution
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_SET=true
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_INSTANCE_CREATE=true
      - WEBHOOK_EVENTS_INSTANCE_DELETE=true
      - AUTHENTICATION_API_KEY=nfe-brasil-2026
      - LOG_LEVEL=ERROR,WARN,INFO
      - LOG_COLOR=true
      - LOG_BAILEYS=warn
      - DEL_INSTANCE=false
      - TELEMETRY_ENABLED=false
      - CORS_ORIGIN=*
    volumes:
      - nfe_evolution_instances:/evolution/instances
      - nfe_evolution_store:/evolution/store
    depends_on:
      nfe-postgres:
        condition: service_healthy
      nfe-redis:
        condition: service_healthy
    restart: unless-stopped

  # ============================================
  # MCP Server - 49 Tools Notas Fiscais
  # ============================================
  nfe-mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: nfe-mcp-server
    ports:
      - "8090:8000"
    environment:
      - FASTMCP_TRANSPORT=http
      - PORT=8000
      - HOST=0.0.0.0
    volumes:
      - ./certificados:/app/certificados:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # WhatsApp Bot - Webhook Handler
  # ============================================
  nfe-whatsapp-bot:
    build:
      context: ./whatsapp-bot
      dockerfile: Dockerfile
    container_name: nfe-whatsapp-bot
    ports:
      - "3002:3002"
    environment:
      - PORT=3002
      - MCP_SERVER_URL=http://nfe-mcp-server:8000/mcp
      - EVOLUTION_API_URL=http://nfe-evolution-api:8080
      - EVOLUTION_API_KEY=nfe-brasil-2026
    depends_on:
      nfe-mcp-server:
        condition: service_healthy
      nfe-evolution-api:
        condition: service_started
    restart: unless-stopped

volumes:
  nfe_postgres_data:
  nfe_evolution_instances:
  nfe_evolution_store:
